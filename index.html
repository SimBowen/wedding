<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Find Your Seat — B &amp; ZQ Wedding</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:#faf8f5;color:#2c2416;min-height:100vh}
#app{max-width:820px;margin:0 auto;padding:0 0 2rem}
.hdr{text-align:center;padding:2rem 1rem 1.25rem;border-bottom:0.5px solid #d4b97a44}
.hdr .mono{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:4px;color:#b89a5e;text-transform:uppercase;margin-bottom:4px}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;font-style:italic;margin-bottom:3px}
.hdr .sub{font-size:10px;letter-spacing:2px;color:#7a7060;text-transform:uppercase}
.nav-tabs{display:flex;border-bottom:0.5px solid #d4b97a44;background:#faf8f5}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#a89878;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Jost',sans-serif}
.tab:hover{color:#b89a5e}.tab.active{color:#b89a5e;border-bottom-color:#b89a5e}
.sw{padding:1.25rem 1.5rem 0.75rem}
.sl{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:#7a7060;margin-bottom:8px;display:block}
.dp{position:relative}
.si{width:100%;height:44px;border:0.5px solid #b89a5e;border-radius:4px;padding:0 14px;font-family:'Jost',sans-serif;font-size:16px;background:#fff;color:#2c2416;outline:none;-webkit-appearance:none}
.si::placeholder{color:#bdb19a}
.sugg{position:absolute;top:46px;left:0;right:0;background:#fff;border:0.5px solid #b89a5e;border-radius:4px;z-index:10;max-height:240px;overflow-y:auto;display:none;box-shadow:0 4px 12px #00000012}
.sugg.open{display:block}
.si-item{padding:11px 14px;font-size:14px;cursor:pointer;color:#2c2416;border-bottom:0.5px solid #f0ebe0}
.si-item:last-child{border-bottom:none}
.si-item:hover,.si-item.act{background:#fdf5ea}
.sn{font-weight:500}.sh{font-size:11px;color:#7a7060;margin-top:2px}
.rb{margin:0 1.5rem 0.75rem;padding:13px 16px;background:#fdf8f0;border:0.5px solid #b89a5e;border-radius:6px;display:none;align-items:center;gap:13px}
.rb.show{display:flex}
.ri{width:38px;height:38px;border-radius:50%;background:#b89a5e;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ri svg{width:17px;height:17px;fill:#fff}
.rn{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic}
.rs{font-size:12px;color:#7a7060;margin-top:2px}.rs strong{color:#b89a5e;font-weight:500}
.fw{margin:0 1.5rem;border:0.5px solid #d4b97a55;border-radius:8px;overflow:hidden;background:#fdfaf6}
.ft{padding:8px 14px;font-size:10px;letter-spacing:2.5px;color:#7a7060;text-transform:uppercase;border-bottom:0.5px solid #d4b97a33;background:#faf7f2}
#fp{display:block;width:100%}
.leg{display:flex;gap:16px;padding:8px 14px;border-top:0.5px solid #d4b97a33;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:6px;font-size:10px;color:#7a7060}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.clr{display:none;margin:0.85rem 1.5rem 0;background:transparent;border:0.5px solid #b89a5e;color:#b89a5e;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:7px 18px;border-radius:4px;cursor:pointer}
.clr.show{display:inline-block}
#schedView{display:none;padding:0 1.5rem 1rem}
.sl2{padding:1rem 0 0.5rem}
.sched-loading{padding:2rem;text-align:center;font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:#a89878}
.cat-block{margin-bottom:1.25rem}
.cat-header{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:5px 5px 0 0}
.cat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#fff;font-weight:500}
.cat-rows{border:0.5px solid #e0d5c0;border-top:none;border-radius:0 0 5px 5px;overflow:hidden}
.sched-row{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:0.5px solid #f0ebe0;background:#fff}
.sched-row:last-child{border-bottom:none}.sched-row:hover{background:#fdfaf5}
.sched-time{font-size:12px;font-weight:500;color:#b89a5e;min-width:42px;flex-shrink:0;padding-top:1px;font-variant-numeric:tabular-nums}
.sched-event{font-size:13px;color:#2c2416;line-height:1.5}
</style>
</head>
<body>
<div id="app">
<div class="hdr">
  <div class="mono">B &amp; ZQ · 6 December 2026</div>
  <h1>Wedding Day</h1>
  <div class="sub">Paradox Singapore</div>
</div>
<div class="nav-tabs">
  <button class="tab active" id="tabSeat" onclick="showTab('seat')">Find My Seat</button>
  <button class="tab" id="tabSched" onclick="showTab('sched')">Schedule</button>
</div>
<div id="seatView">
  <div class="sw">
    <span class="sl">Enter your name to find your table</span>
    <div class="dp">
      <input class="si" id="search" type="text" placeholder="e.g. Wei Ming Tan" autocomplete="off"/>
      <div class="sugg" id="sugg"></div>
    </div>
  </div>
  <div class="rb" id="rb">
    <div class="ri"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
    <div>
      <div class="rn" id="rn"></div>
      <div class="rs">Seated at <strong id="rt"></strong> · Seat <strong id="rseat"></strong></div>
    </div>
  </div>
  <div class="fw">
    <div class="ft">Banquet Hall Floor Plan</div>
    <svg id="fp" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="20" width="760" height="660" rx="8" fill="#fdfaf6" stroke="#d4b97a" stroke-width="1"/>
      <rect x="355" y="20" width="90" height="660" fill="#f5f0e8" opacity="0.9"/>
      <text font-family="Jost,sans-serif" font-size="9" letter-spacing="2.5" fill="#c9aa78" text-anchor="middle" x="400" y="350" transform="rotate(90,400,350)">· · · A I S L E · · ·</text>
      <rect x="250" y="24" width="300" height="36" rx="4" fill="#e8dfc8" stroke="#b89a5e" stroke-width="0.8"/>
      <text font-family="Cormorant Garamond,serif" font-size="12" font-style="italic" fill="#7a7060" text-anchor="middle" dominant-baseline="central" x="400" y="42">Stage</text>
      <rect x="355" y="644" width="90" height="22" rx="3" fill="#d4b97a33" stroke="#b89a5e" stroke-width="0.5"/>
      <text font-family="Jost,sans-serif" font-size="9" letter-spacing="2" fill="#b89a5e" text-anchor="middle" dominant-baseline="central" x="400" y="655">ENTRANCE</text>
      <g id="tg"></g>
    </svg>
    <div class="leg">
      <div class="li"><div class="ld" style="background:#c8b8a0;border:0.5px solid #a8987a"></div>Table</div>
      <div class="li"><div class="ld" style="background:#e8c24a;border:0.5px solid #c9a830"></div>Your table</div>
      <div class="li"><div style="width:14px;height:10px;background:#f5f0e8;border:0.5px solid #d4c9a8;border-radius:2px"></div>Aisle</div>
    </div>
  </div>
  <button class="clr" id="clr">Clear search</button>
</div>
<div id="schedView">
  <div class="sl2">
    <div class="sched-loading" id="schedLoading">Loading schedule…</div>
    <div id="schedContent"></div>
  </div>
</div>
</div>
<script>
const TD=[{"id":1,"cx":240,"cy":125,"guests":[{"name":"a","seat":4,"table":1}]},{"id":2,"cx":105,"cy":125,"guests":[{"name":"b","seat":4,"table":2}]},{"id":3,"cx":560,"cy":125,"guests":[{"name":"c","seat":1,"table":3}]},{"id":4,"cx":695,"cy":125,"guests":[{"name":"d","seat":1,"table":4}]},{"id":5,"cx":240,"cy":210,"guests":[{"name":"e","seat":1,"table":5}]},{"id":6,"cx":105,"cy":210,"guests":[{"name":"f","seat":1,"table":6}]},{"id":7,"cx":560,"cy":210,"guests":[{"name":"g","seat":1,"table":7}]},{"id":8,"cx":695,"cy":210,"guests":[{"name":"h","seat":1,"table":8}]},{"id":9,"cx":240,"cy":295,"guests":[{"name":"i","seat":1,"table":9}]},{"id":10,"cx":105,"cy":295,"guests":[{"name":"j","seat":1,"table":10}]},{"id":11,"cx":560,"cy":295,"guests":[{"name":"k","seat":1,"table":11}]},{"id":12,"cx":695,"cy":295,"guests":[{"name":"l","seat":1,"table":12}]},{"id":13,"cx":240,"cy":380,"guests":[{"name":"m","seat":1,"table":13}]},{"id":14,"cx":105,"cy":380,"guests":[{"name":"n","seat":1,"table":14}]},{"id":15,"cx":560,"cy":380,"guests":[{"name":"o","seat":1,"table":15}]},{"id":16,"cx":695,"cy":380,"guests":[{"name":"p","seat":1,"table":16}]},{"id":17,"cx":240,"cy":465,"guests":[{"name":"q","seat":1,"table":17}]},{"id":18,"cx":105,"cy":465,"guests":[{"name":"r","seat":1,"table":18}]},{"id":19,"cx":560,"cy":465,"guests":[{"name":"s","seat":1,"table":19}]},{"id":20,"cx":695,"cy":465,"guests":[{"name":"t","seat":1,"table":20}]}];
const TR=36;
const allG=[];
TD.forEach(t=>t.guests.forEach(g=>{if(g.name)allG.push({name:g.name,seat:g.seat,table:t.id,cx:t.cx,cy:t.cy});}));
function drawT(hlId){
  const g=document.getElementById('tg');g.innerHTML='';
  TD.forEach(t=>{
    const hl=t.id===hlId,fill=hl?'#f5e68a':'#e8dfc8',strk=hl?'#c9a830':'#a8987a',sw=hl?'2':'0.7';
    const ring=hl?`<circle cx="${t.cx}" cy="${t.cy}" r="44" fill="none" stroke="#c9a830" stroke-width="1" opacity="0.4"><animate attributeName="r" values="40;50;40" dur="1.2s" repeatCount="3"/><animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="3"/></circle>`:'';
    const anim=hl?'<animate attributeName="r" values="36;39;36" dur="1.2s" repeatCount="3"/>';
    g.innerHTML+=`<g>${ring}<circle cx="${t.cx}" cy="${t.cy}" r="36" fill="${fill}" stroke="${strk}" stroke-width="${sw}">${hl?anim:''}</circle>
    <text font-family="Jost,sans-serif" font-size="9" fill="${hl?'#7a5a00':'#7a7060'}" text-anchor="middle" dominant-baseline="central" x="${t.cx}" y="${t.cy-11}">Table</text>
    <text font-family="Cormorant Garamond,serif" font-size="20" fill="${hl?'#5a4200':'#5a5040'}" text-anchor="middle" dominant-baseline="central" x="${t.cx}" y="${t.cy+8}">${t.id}</text></g>`;
  });
}
drawT(null);
let hi=-1;
document.getElementById('search').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase(),sg=document.getElementById('sugg');hi=-1;
  if(!q){sg.classList.remove('open');return;}
  const m=allG.filter(g=>g.name.toLowerCase().includes(q)).slice(0,8);
  if(!m.length){sg.classList.remove('open');return;}
  sg.innerHTML=m.map((g,i)=>`<div class="si-item"><div class="sn">${g.name}</div><div class="sh">Table ${g.table} · Seat ${g.seat}</div></div>`).join('');
  sg.querySelectorAll('.si-item').forEach((el,i)=>el.addEventListener('click',()=>{document.getElementById('search').value=m[i].name;sg.classList.remove('open');show(m[i]);}));
  sg._m=m;sg.classList.add('open');
});
document.getElementById('search').addEventListener('keydown',function(e){
  const sg=document.getElementById('sugg'),items=sg.querySelectorAll('.si-item');if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();hi=Math.min(hi+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('act',i===hi));}
  else if(e.key==='ArrowUp'){e.preventDefault();hi=Math.max(hi-1,0);items.forEach((el,i)=>el.classList.toggle('act',i===hi));}
  else if(e.key==='Enter'){e.preventDefault();const m=sg._m;const idx=hi>=0?hi:0;if(m&&m[idx]){this.value=m[idx].name;sg.classList.remove('open');show(m[idx]);}}
  else if(e.key==='Escape'){sg.classList.remove('open');}
});
document.addEventListener('click',e=>{if(!e.target.closest('.dp'))document.getElementById('sugg').classList.remove('open');});
function show(g){drawT(g.table);document.getElementById('rn').textContent=g.name;document.getElementById('rt').textContent='Table '+g.table;document.getElementById('rseat').textContent=g.seat;document.getElementById('rb').classList.add('show');document.getElementById('clr').classList.add('show');}
document.getElementById('clr').addEventListener('click',()=>{drawT(null);document.getElementById('rb').classList.remove('show');document.getElementById('clr').classList.remove('show');document.getElementById('search').value='';});
let schedLoaded=false;
function showTab(t){
  document.getElementById('seatView').style.display=t==='seat'?'block':'none';
  document.getElementById('schedView').style.display=t==='sched'?'block':'none';
  document.getElementById('tabSeat').classList.toggle('active',t==='seat');
  document.getElementById('tabSched').classList.toggle('active',t==='sched');
  if(t==='sched'&&!schedLoaded)loadSched();
}
function loadSched(){
  fetch('schedule.json').then(r=>r.json()).then(data=>{
    schedLoaded=true;
    document.getElementById('schedLoading').style.display='none';
    const wrap=document.getElementById('schedContent');wrap.innerHTML='';
    Object.entries(data).forEach(([cat,info])=>{
      const block=document.createElement('div');block.className='cat-block';
      const header=document.createElement('div');header.className='cat-header';header.style.background=info.color;
      header.innerHTML=`<span class="cat-label">${cat}</span>`;
      const rows=document.createElement('div');rows.className='cat-rows';
      info.items.forEach(item=>{
        const row=document.createElement('div');row.className='sched-row';
        row.innerHTML=`<span class="sched-time">${item.time}</span><span class="sched-event">${item.event}</span>`;
        rows.appendChild(row);
      });
      block.appendChild(header);block.appendChild(rows);wrap.appendChild(block);
    });
  }).catch(()=>{document.getElementById('schedLoading').textContent='Could not load schedule.json';});
}
</script>
</body>
</html>
